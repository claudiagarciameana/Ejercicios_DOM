<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelectorCSS</title>
    <script src="js/miscript.js"></script>
</head>
<body>
    <div class="texto">
        Contenido que se va a copiar al primer párrafo del documento
    </div>
    <div class="texto">
        Este contenido no se va a copiar.
        Lo copiado aparecerá en el párrafo que está debajo de este div

    </div>
    <p>
        <button id="copiar">Copiar</button>
    </p>
</body>
</html>
